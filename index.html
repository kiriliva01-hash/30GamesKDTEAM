<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎮 30 Игр — Игровой Портал</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #0b0b1f;
      --glass: rgba(20, 20, 50, 0.6);
      --accent: #7c5cfc;
      --accent2: #c4b5fd;
      --gold: #facc15;
      --text: #e2e8f0;
      --danger: #ef4444;
      --success: #22c55e;
      --card-bg: rgba(30, 30, 70, 0.5);
    }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      background-image: radial-gradient(ellipse at 20% 30%, rgba(124,92,252,0.2) 0%, transparent 50%),
                        radial-gradient(ellipse at 80% 70%, rgba(250,204,21,0.15) 0%, transparent 50%);
    }
    .stars {
      position: fixed; top:0; left:0; width:100%; height:100%; pointer-events: none; z-index:0;
    }
    .star {
      position: absolute; background: white; border-radius: 50%;
      animation: twinkle var(--dur) ease-in-out infinite; animation-delay: var(--delay); opacity:0;
    }
    @keyframes twinkle {
      0%,100% { opacity:0.2; transform:scale(1); }
      50% { opacity:1; transform:scale(2); }
    }
    .container {
      max-width: 1300px; margin:0 auto; padding:20px; position:relative; z-index:1;
    }
    header {
      text-align: center; padding: 30px 20px 10px;
    }
    header h1 {
      font-size: 3rem;
      background: linear-gradient(135deg, #a78bfa, #facc15, #a78bfa);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      letter-spacing: 2px; margin-bottom: 8px;
    }
    header p { font-size: 1.1rem; color: #94a3b8; }
    .game-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(170px,1fr));
      gap: 18px; padding: 20px 0;
    }
    .game-card {
      background: var(--card-bg); backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 24px; padding: 20px 12px; text-align: center; cursor: pointer;
      transition: all 0.3s ease; box-shadow: 0 8px 20px rgba(0,0,0,0.3);
    }
    .game-card:hover {
      transform: translateY(-8px); border-color: var(--accent);
      box-shadow: 0 20px 40px rgba(124,92,252,0.4); background: rgba(50,50,90,0.7);
    }
    .game-card .icon { font-size: 2.8rem; display: block; margin-bottom: 12px; }
    .game-card .title { font-weight: 700; font-size: 1rem; color: #e2e8f0; }
    .game-card .badge {
      display: inline-block; font-size: 0.7rem; padding: 4px 12px; border-radius: 20px;
      background: rgba(124,92,252,0.3); color: var(--accent2); margin-top: 8px;
    }
    .game-area {
      display: none; position: fixed; top:0; left:0; width:100%; height:100%;
      background: rgba(10,10,25,0.95); backdrop-filter: blur(20px); z-index:100;
      overflow-y: auto; flex-direction: column; align-items: center; padding: 20px;
    }
    .game-area.active { display: flex; }
    .back-btn {
      position: sticky; top: 20px; background: var(--accent); color:#fff; border:none;
      padding: 12px 30px; border-radius: 30px; cursor:pointer; font-weight:700; font-size:1rem;
      letter-spacing:1px; margin-bottom:20px; z-index:10; transition: 0.3s;
    }
    .back-btn:hover { background: #9370ff; box-shadow:0 8px 25px rgba(124,92,252,0.5); }
    .game-content { max-width: 750px; width:100%; text-align:center; }
    canvas { border-radius: 16px; background: #111; max-width:100%; box-shadow:0 10px 30px rgba(0,0,0,0.5); }
    button {
      background: var(--accent); color:#fff; border:none; padding:10px 22px; border-radius:30px;
      cursor:pointer; font-weight:600; margin:6px; transition:0.3s;
    }
    button:hover { background: #9370ff; box-shadow:0 5px 20px rgba(124,92,252,0.4); }
    .score { font-size:1.3rem; font-weight:700; color:var(--gold); margin:8px 0; }
    .grid-3x3 { display:grid; grid-template-columns:repeat(3,80px); gap:6px; justify-content:center; }
    .grid-3x3 div { background:var(--glass); border-radius:12px; height:80px; display:flex; align-items:center; justify-content:center; font-size:2rem; cursor:pointer; }
    .memory-grid { display:grid; grid-template-columns:repeat(4,70px); gap:8px; justify-content:center; }
    .memory-grid .card { width:70px; height:70px; background:var(--accent); border-radius:12px; cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:2rem; transition:0.3s; }
    .memory-grid .card.flipped { background:#fff; color:#000; }
    .memory-grid .card.matched { background:var(--success); pointer-events:none; opacity:0.7; }
    .mole-grid { display:grid; grid-template-columns:repeat(3,90px); gap:10px; justify-content:center; }
    .mole-grid .hole { width:90px; height:90px; background:#3b280b; border-radius:50%; cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:3rem; }
    .battleship-container { display:flex; flex-wrap:wrap; justify-content:center; gap:30px; margin:15px 0; }
    .board-wrapper { text-align:center; }
    .battleship-grid { display:grid; grid-template-columns:repeat(10,32px); grid-template-rows:repeat(10,32px); gap:1px; background:#14213d; padding:2px; border-radius:8px; }
    .battleship-cell { width:32px; height:32px; background:#0d1b33; border-radius:3px; display:flex; align-items:center; justify-content:center; font-size:0.9rem; cursor:default; transition:0.1s; }
    .battleship-cell.ship { background:#2ecc71; }
    .battleship-cell.hit { background:#ef4444; }
    .battleship-cell.miss { background:#4b5563; }
    .battleship-cell.placeable { cursor:pointer; background:#1e3a5f; }
    .battleship-cell.placeable:hover { background:#4f46e5; }
    .battleship-cell.preview { background: #a78bfa; }
    .ship-select { display:flex; gap:10px; justify-content:center; margin:10px 0; flex-wrap:wrap; }
    .ship-btn { padding:8px 16px; border-radius:20px; background:var(--glass); border:2px solid transparent; }
    .ship-btn.selected { border-color:var(--gold); background:var(--accent); }
    .overlay { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); display:flex; align-items:center; justify-content:center; z-index:200; }
    .overlay-content { background:var(--bg); padding:30px; border-radius:24px; text-align:center; border:1px solid var(--accent); }
    .footer {
      text-align: center; padding: 20px; color: #64748b; font-size: 0.8rem;
      border-top: 1px solid rgba(255,255,255,0.1); margin-top: 40px;
    }
    .footer a { color: #a78bfa; text-decoration: none; }
    @media (max-width:768px) {
      .game-grid { grid-template-columns: repeat(auto-fill, minmax(130px,1fr)); }
      .battleship-grid { grid-template-columns:repeat(10,26px); grid-template-rows:repeat(10,26px); }
      .battleship-cell { width:26px; height:26px; font-size:0.7rem; }
    }
  </style>
</head>
<body>
<div class="stars" id="starsContainer"></div>
<div class="container" id="mainMenu">
  <header>
    <h1>🎮 30 ИГР</h1>
    <p>Выбери игру и играй прямо в браузере!</p>
  </header>
  <div class="game-grid" id="gameGrid"></div>
  <div class="footer">
    Поддержка: <a href="mailto:kiriliva01@list.ru">kiriliva01@list.ru</a> &nbsp;|&nbsp; TG: <a href="https://t.me/ivakisrr" target="_blank">@ivakisrr</a>
  </div>
</div>
<div class="game-area" id="gameArea"></div>

<script>
  (()=>{
    const sc=document.getElementById('starsContainer');
    for(let i=0;i<100;i++){const s=document.createElement('div'); s.className='star'; s.style.cssText=`left:${Math.random()*100}%;top:${Math.random()*100}%;width:${1+Math.random()*3}px;height:${1+Math.random()*3}px;--dur:${2+Math.random()*4}s;--delay:${Math.random()*5}s`; sc.appendChild(s);}
  })();

  const games = [
    {id:'tictactoe',name:'Крестики-Нолики',icon:'❌⭕',badge:'Логика'},
    {id:'snake',name:'Змейка',icon:'🐍',badge:'Аркада'},
    {id:'memory',name:'Мемори',icon:'🧠',badge:'Память'},
    {id:'rps',name:'Камень-Ножницы-Бумага',icon:'✊✋✌️',badge:'Удача'},
    {id:'guessnumber',name:'Угадай Число',icon:'🔢',badge:'Логика'},
    {id:'whackamole',name:'Ударь Крота',icon:'🔨🐹',badge:'Реакция'},
    {id:'typing',name:'Скорость Печати',icon:'⌨️',badge:'Навык'},
    {id:'colorguess',name:'Угадай Цвет',icon:'🎨',badge:'Внимание'},
    {id:'mathquiz',name:'Математика',icon:'🧮',badge:'Ум'},
    {id:'reaction',name:'Реакция',icon:'⚡',badge:'Скорость'},
    {id:'dice',name:'Кости',icon:'🎲',badge:'Удача'},
    {id:'wordscramble',name:'Анаграммы',icon:'🔤',badge:'Слова'},
    {id:'simon',name:'Саймон',icon:'🔴🟢🔵🟡',badge:'Память'},
    {id:'puzzle15',name:'Пятнашки',icon:'🧩',badge:'Логика'},
    {id:'pong',name:'Понг',icon:'🏓',badge:'Аркада'},
    {id:'breakout',name:'Брейкаут',icon:'🧱',badge:'Аркада'},
    {id:'flappy',name:'Flappy Bird',icon:'🐦',badge:'Аркада'},
    {id:'spaceshooter',name:'Космо-Стрелялка',icon:'🚀',badge:'Экшн'},
    {id:'minesweeper',name:'Сапёр',icon:'💣',badge:'Логика'},
    {id:'connect4',name:'4 в Ряд',icon:'🟡🔴',badge:'Стратегия'},
    {id:'coinflip',name:'Монетка',icon:'🪙',badge:'Удача'},
    {id:'clickspeed',name:'Клик-Тест',icon:'🖱️',badge:'Скорость'},
    {id:'maze',name:'Лабиринт',icon:'🏰',badge:'Логика'},
    {id:'doodlejump',name:'Doodle Jump',icon:'📱',badge:'Аркада'},
    {id:'towerbuilder',name:'Башня',icon:'🏗️',badge:'Точность'},
    {id:'catchfall',name:'Лови Предметы',icon:'🧺',badge:'Реакция'},
    {id:'aimtrainer',name:'Тренажёр AIM',icon:'🎯',badge:'Меткость'},
    {id:'bubblepop',name:'Лопай Пузыри',icon:'🫧',badge:'Релакс'},
    {id:'battleship',name:'Морской бой',icon:'⚓',badge:'Стратегия'},
    {id:'game2048',name:'2048',icon:'🔢',badge:'Головоломка'}
  ];

  const grid=document.getElementById('gameGrid');
  games.forEach((g,i)=>{
    const c=document.createElement('div'); c.className='game-card';
    c.innerHTML=`<span class="icon">${g.icon}</span><div class="title">${g.name}</div><span class="badge">${g.badge}</span>`;
    c.addEventListener('click',()=>openGame(g)); grid.appendChild(c);
  });

  const area=document.getElementById('gameArea'), menu=document.getElementById('mainMenu');
  let cleanupFn=null;
  function openGame(g){
    menu.style.display='none'; area.innerHTML=''; area.className='game-area active';
    const back=document.createElement('button'); back.className='back-btn'; back.textContent='← НАЗАД';
    back.onclick=closeGame; area.appendChild(back);
    const h2=document.createElement('h2'); h2.textContent=g.name; area.appendChild(h2);
    const content=document.createElement('div'); content.className='game-content'; content.id='gc'; area.appendChild(content);
    if(cleanupFn){cleanupFn(); cleanupFn=null;}
    cleanupFn=launchGame(g,content);
  }
  function closeGame(){
    if(cleanupFn){cleanupFn(); cleanupFn=null;}
    area.className='game-area'; area.innerHTML=''; menu.style.display='block';
  }

  function launchGame(g,c){ switch(g.id){
    case 'tictactoe': return initTTT(c);
    case 'snake': return initSnake(c);
    case 'memory': return initMemory(c);
    case 'rps': return initRPS(c);
    case 'guessnumber': return initGuessNum(c);
    case 'whackamole': return initMole(c);
    case 'typing': return initTyping(c);
    case 'colorguess': return initColor(c);
    case 'mathquiz': return initMath(c);
    case 'reaction': return initReaction(c);
    case 'dice': return initDice(c);
    case 'wordscramble': return initWordScramble(c);
    case 'simon': return initSimon(c);
    case 'puzzle15': return initPuzzle15(c);
    case 'pong': return initPong(c);
    case 'breakout': return initBreakout(c);
    case 'flappy': return initFlappy(c);
    case 'spaceshooter': return initShooter(c);
    case 'minesweeper': return initMinesweeper(c);
    case 'connect4': return initConnect4(c);
    case 'coinflip': return initCoinFlip(c);
    case 'clickspeed': return initClickSpeed(c);
    case 'maze': return initMaze(c);
    case 'doodlejump': return initDoodle(c);
    case 'towerbuilder': return initTower(c);
    case 'catchfall': return initCatch(c);
    case 'aimtrainer': return initAim(c);
    case 'bubblepop': return initBubble(c);
    case 'battleship': return initBattle(c);
    case 'game2048': return init2048(c);
    default: return null;
  }}

  // ---------- 1. Крестики-Нолики ----------
  function initTTT(c){ c.innerHTML=`<div class="score" id="tttStat">Ход: ❌</div><div class="grid-3x3" id="tttGrid"></div><button id="tttReset">🔄 Новая игра</button>`; let b=Array(9).fill(null), turn='X', over=false; const grid=c.querySelector('#tttGrid'),stat=c.querySelector('#tttStat'); function render(){grid.innerHTML='';b.forEach((v,i)=>{const d=document.createElement('div'); d.textContent=v==='X'?'❌':v==='O'?'⭕':''; d.onclick=()=>move(i);grid.appendChild(d);});} function move(i){if(b[i]||over)return; b[i]=turn; if(checkWin(b,turn)){over=true;stat.textContent=`Победил ${turn==='X'?'❌':'⭕'}!`;}else if(b.every(x=>x)){over=true;stat.textContent='Ничья!';}else{turn=turn==='X'?'O':'X';stat.textContent=`Ход: ${turn==='X'?'❌':'⭕'}`;} render();} function checkWin(b,p){const w=[[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]]; return w.some(a=>a.every(i=>b[i]===p));} c.querySelector('#tttReset').onclick=()=>{b=Array(9).fill(null);turn='X';over=false;stat.textContent='Ход: ❌';render();}; render(); return ()=>{}; }

  // ---------- 2. Змейка ----------
  function initSnake(c){ c.innerHTML=`<div class="score" id="snScore">Счёт: 0</div><canvas id="snCanvas" width="400" height="400"></canvas><button id="snRestart">🔄 Заново</button>`; const canvas=c.querySelector('#snCanvas'),ctx=canvas.getContext('2d'),scoreEl=c.querySelector('#snScore'); let snake=[{x:10,y:10}],dir={x:1,y:0},food,score=0,over=false,interval; function spawn(){let f; do{f={x:Math.floor(Math.random()*20),y:Math.floor(Math.random()*20)};}while(snake.some(s=>s.x===f.x&&s.y===f.y));return f;} food=spawn(); function step(){if(over)return; const head={x:snake[0].x+dir.x,y:snake[0].y+dir.y}; if(head.x<0||head.x>=20||head.y<0||head.y>=20||snake.some(s=>s.x===head.x&&s.y===head.y)){over=true;clearInterval(interval);scoreEl.textContent=`Игра окончена! Счёт: ${score}`;return;} snake.unshift(head); if(head.x===food.x&&head.y===food.y){score++;food=spawn();}else{snake.pop();} scoreEl.textContent=`Счёт: ${score}`; draw();} function draw(){ctx.fillStyle='#111';ctx.fillRect(0,0,400,400);ctx.fillStyle='#2ecc71'; snake.forEach(s=>ctx.fillRect(s.x*20,s.y*20,18,18));ctx.fillStyle='#e74c3c';ctx.fillRect(food.x*20,food.y*20,18,18);} function key(e){const map={ArrowUp:{x:0,y:-1},ArrowDown:{x:0,y:1},ArrowLeft:{x:-1,y:0},ArrowRight:{x:1,y:0}}; if(map[e.key]){e.preventDefault(); const nd=map[e.key]; if(nd.x!==-dir.x||nd.y!==-dir.y) dir=nd;}} document.addEventListener('keydown',key); c.querySelector('#snRestart').onclick=()=>{clearInterval(interval); snake=[{x:10,y:10}];dir={x:1,y:0};food=spawn();score=0;over=false;scoreEl.textContent='Счёт: 0';interval=setInterval(step,120);}; interval=setInterval(step,120); draw(); return ()=>{clearInterval(interval);document.removeEventListener('keydown',key);}; }

  // ---------- 3. Мемори ----------
  function initMemory(c){ c.innerHTML=`<div class="score" id="memScore">Пары: 0/8</div><div class="memory-grid" id="memGrid"></div><button id="memReset">🔄 Перемешать</button>`; const emojis=['🍎','🍊','🍋','🍇','🍒','🥝','🍑','🍌']; let cards=[...emojis,...emojis].sort(()=>Math.random()-0.5),flipped=[],matched=[],lock=false; const grid=c.querySelector('#memGrid'),scoreEl=c.querySelector('#memScore'); function render(){grid.innerHTML='';cards.forEach((e,i)=>{const card=document.createElement('div');card.className='card';if(flipped.includes(i)||matched.includes(i)){card.classList.add('flipped');card.textContent=e;} if(matched.includes(i))card.classList.add('matched');card.onclick=()=>flip(i);grid.appendChild(card);});scoreEl.textContent=`Пары: ${matched.length/2}/8`; if(matched.length===16)scoreEl.textContent='Победа!';} function flip(i){if(lock||flipped.includes(i)||matched.includes(i)||flipped.length>=2)return; flipped.push(i);render();if(flipped.length===2){lock=true;const[a,b]=flipped;if(cards[a]===cards[b]){matched.push(a,b);flipped=[];lock=false;render();}else setTimeout(()=>{flipped=[];lock=false;render();},700);}} c.querySelector('#memReset').onclick=()=>{cards=[...emojis,...emojis].sort(()=>Math.random()-0.5);flipped=[];matched=[];lock=false;render();}; render(); return ()=>{}; }

  // ---------- 4. Камень-Ножницы-Бумага ----------
  function initRPS(c){ c.innerHTML=`<div class="score" id="rpsScore">Ты 0 - 0 Комп</div><div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap;"><button data-v="rock">✊ Камень</button><button data-v="scissors">✌️ Ножницы</button><button data-v="paper">✋ Бумага</button></div><div id="rpsRes" style="margin-top:12px;"></div>`; let p=0,o=0; const s=c.querySelector('#rpsScore'),r=c.querySelector('#rpsRes'); c.querySelectorAll('button[data-v]').forEach(b=>b.onclick=()=>{const arr=['rock','scissors','paper']; const pl=b.dataset.v, comp=arr[Math.floor(Math.random()*3)]; const em={rock:'✊',scissors:'✌️',paper:'✋'}; let res=''; if(pl===comp)res='Ничья'; else if((pl==='rock'&&comp==='scissors')||(pl==='scissors'&&comp==='paper')||(pl==='paper'&&comp==='rock')){res='Ты выиграл!';p++;}else{res='Комп выиграл';o++;} s.textContent=`Ты ${p} - ${o} Комп`; r.textContent=`${em[pl]} vs ${em[comp]} — ${res}`;}); return ()=>{}; }

  // ---------- 5. Угадай число ----------
  function initGuessNum(c){ c.innerHTML=`<p>Число от 1 до 100</p><input type="number" id="gnInput" min="1" max="100"><button id="gnBtn">Угадать</button><div id="gnHint"></div><div class="score" id="gnAtt">Попытки: 0</div><button id="gnReset">Новое</button>`; let secret=Math.floor(Math.random()*100)+1,att=0; const hint=c.querySelector('#gnHint'),attEl=c.querySelector('#gnAtt'),inp=c.querySelector('#gnInput'); c.querySelector('#gnBtn').onclick=()=>{const g=parseInt(inp.value);if(isNaN(g))return; att++; attEl.textContent=`Попытки: ${att}`; if(g===secret)hint.textContent=`Верно! ${secret}`; else if(g<secret)hint.textContent='Больше'; else hint.textContent='Меньше';}; c.querySelector('#gnReset').onclick=()=>{secret=Math.floor(Math.random()*100)+1;att=0;hint.textContent='';attEl.textContent='Попытки: 0';inp.value='';}; return ()=>{}; }

  // ---------- 6. Ударь крота ----------
  function initMole(c){ c.innerHTML=`<div class="score" id="moleScore">0</div><div class="mole-grid" id="moleGrid"></div><button id="moleStart">Старт</button>`; let score=0,active=-1,playing=false,interval; const grid=c.querySelector('#moleGrid'),scEl=c.querySelector('#moleScore'); for(let i=0;i<9;i++){const h=document.createElement('div');h.className='hole';h.dataset.i=i;h.onclick=()=>{if(playing&&parseInt(h.dataset.i)===active){score++;scEl.textContent=score;active=-1;render();}};grid.appendChild(h);} function render(){[...grid.children].forEach((h,i)=>{h.classList.toggle('active',i===active);h.textContent=i===active?'🐹':'';});} function start(){score=0;playing=true;scEl.textContent='0';clearInterval(interval); interval=setInterval(()=>{active=Math.floor(Math.random()*9);render();setTimeout(()=>{active=-1;render();},600);},800); setTimeout(()=>{clearInterval(interval);playing=false;active=-1;render();scEl.textContent=`Финиш: ${score}`;},15000);} c.querySelector('#moleStart').onclick=start; render(); return ()=>clearInterval(interval); }

  // ---------- 7. Скорость печати ----------

  function initMinesweeper(c){ c.innerHTML=`<div class="score" id="msSt">🚩10</div><div class="minesweeper-grid" id="msG"></div><button id="msR">Заново</button>`; const size=8,mines=10; let board,revealed,flagged,over; const grid=c.querySelector('#msG'),st=c.querySelector('#msSt'); function init(){board=Array(size).fill().map(()=>Array(size).fill(0)); revealed=Array(size).fill().map(()=>Array(size).fill(false)); flagged=Array(size).fill().map(()=>Array(size).fill(false)); over=false; let p=0;while(p<mines){const r=Math.floor(Math.random()*size),c=Math.floor(Math.random()*size);if(board[r][c]!=='M'){board[r][c]='M';p++;}} for(let r=0;r<size;r++)for(let c=0;c<size;c++)if(board[r][c]!=='M'){let cnt=0;for(let dr=-1;dr<=1;dr++)for(let dc=-1;dc<=1;dc++){const nr=r+dr,nc=c+dc;if(nr>=0&&nr<size&&nc>=0&&nc<size&&board[nr][nc]==='M')cnt++;} board[r][c]=cnt;} render();} function reveal(r,c){if(over||revealed[r][c]||flagged[r][c])return; revealed[r][c]=true; if(board[r][c]==='M'){over=true;revealAll();}else if(board[r][c]===0){for(let dr=-1;dr<=1;dr++)for(let dc=-1;dc<=1;dc++){const nr=r+dr,nc=c+dc;if(nr>=0&&nr<size&&nc>=0&&nc<size&&!revealed[nr][nc])reveal(nr,nc);}} render();} function revealAll(){for(let r=0;r<size;r++)for(let c=0;c<size;c++)revealed[r][c]=true;render();} function render(){grid.innerHTML='';const fc=flagged.flat().filter(f=>f).length; st.textContent=over?'💥':`🚩${mines-fc}`; for(let r=0;r<size;r++)for(let c=0;c<size;c++){const cell=document.createElement('div');cell.className='cell';if(revealed[r][c]){cell.classList.add('revealed');cell.textContent=board[r][c]==='M'?'💣':board[r][c]||'';}else if(flagged[r][c])cell.classList.add('flagged'); cell.onclick=()=>reveal(r,c); cell.oncontextmenu=e=>{e.preventDefault();if(!revealed[r][c]&&!over){flagged[r][c]=!flagged[r][c];render();}}; grid.appendChild(cell);}} c.querySelector('#msR').onclick=init; init(); return ()=>{}; }

  function initConnect4(c){ c.innerHTML=`<div class="score" id="c4st">Ход 🔴</div><div class="connect4-grid" id="c4g"></div><button id="c4r">Заново</button>`; const rows=6,cols=7; let board,cur,over; const grid=c.querySelector('#c4g'),st=c.querySelector('#c4st'); function init(){board=Array(rows).fill().map(()=>Array(cols).fill(null));cur='red';over=false;render();} function drop(col){if(over)return;for(let r=rows-1;r>=0;r--){if(!board[r][col]){board[r][col]=cur;if(checkWin(r,col)){over=true;st.textContent=`Победил ${cur==='red'?'🔴':'🟡'}!`;}else if(board[0].every(c=>c)){over=true;st.textContent='Ничья!';}else{cur=cur==='red'?'yellow':'red';st.textContent=`Ход ${cur==='red'?'🔴':'🟡'}`;} render();return;}}} function checkWin(r,c){const dirs=[[0,1],[1,0],[1,1],[1,-1]]; return dirs.some(([dr,dc])=>{let cnt=1;for(let i=1;i<4;i++){const nr=r+dr*i,nc=c+dc*i;if(nr>=0&&nr<rows&&nc>=0&&nc<cols&&board[nr][nc]===cur)cnt++;else break;} for(let i=1;i<4;i++){const nr=r-dr*i,nc=c-dc*i;if(nr>=0&&nr<rows&&nc>=0&&nc<cols&&board[nr][nc]===cur)cnt++;else break;} return cnt>=4;});} function render(){grid.innerHTML='';for(let r=0;r<rows;r++)for(let c=0;c<cols;c++){const s=document.createElement('div');s.className='slot';if(board[r][c])s.classList.add(board[r][c]);s.onclick=()=>drop(c);grid.appendChild(s);}} c.querySelector('#c4r').onclick=init; init(); return ()=>{}; }

  function initMaze(c){ c.innerHTML=`<canvas id="mzC" width="400" height="400"></canvas><div class="score" id="mzM">Дойди до зелёного</div><button id="mzN">Новый</button>`; const canvas=c.querySelector('#mzC'),ctx=canvas.getContext('2d'),msg=c.querySelector('#mzM'); const cell=25,cols=16,rows=16; let maze,player,exit,won; function gen(){maze=Array(rows).fill().map(()=>Array(cols).fill(1)); let stack=[{x:1,y:1}];maze[1][1]=0; while(stack.length){const {x,y}=stack[stack.length-1]; const n=[[x-2,y],[x+2,y],[x,y-2],[x,y+2]].filter(([nx,ny])=>nx>0&&nx<cols-1&&ny>0&&ny<rows-1&&maze[ny][nx]===1); if(n.length){const [nx,ny]=n[Math.floor(Math.random()*n.length)];maze[ny][nx]=0;maze[y+(ny-y)/2][x+(nx-x)/2]=0;stack.push({x:nx,y:ny});}else stack.pop();} player={x:1,y:1};exit={x:cols-2,y:rows-2};maze[exit.y][exit.x]=0;won=false;msg.textContent='Дойди до зелёного';draw();} function draw(){ctx.fillStyle='#111';ctx.fillRect(0,0,400,400); for(let r=0;r<rows;r++)for(let c=0;c<cols;c++)if(maze[r][c]===1){ctx.fillStyle='#333';ctx.fillRect(c*cell,r*cell,cell,cell);} ctx.fillStyle='#22c55e';ctx.fillRect(exit.x*cell+4,exit.y*cell+4,cell-8,cell-8); ctx.fillStyle='#3b82f6';ctx.beginPath();ctx.arc(player.x*cell+12.5,player.y*cell+12.5,8,0,2*Math.PI);ctx.fill(); if(won){ctx.fillStyle='rgba(0,0,0,0.7)';ctx.fillRect(0,0,400,400);ctx.fillStyle='#fff';ctx.font='24px sans-serif';ctx.fillText('ПОБЕДА',120,200);}} document.addEventListener('keydown',function mk(e){if(won)return;const map={ArrowUp:[0,-1],ArrowDown:[0,1],ArrowLeft:[-1,0],ArrowRight:[1,0]}; if(map[e.key]){e.preventDefault();const[dx,dy]=map[e.key];const nx=player.x+dx,ny=player.y+dy; if(nx>=0&&nx<cols&&ny>=0&&ny<rows&&maze[ny][nx]===0){player.x=nx;player.y=ny;} if(player.x===exit.x&&player.y===exit.y){won=true;msg.textContent='Выбрался!';} draw();}}); c.querySelector('#mzN').onclick=gen; gen(); return ()=>{}; }

  function initTower(c){ c.innerHTML=`<div class="score" id="tbS">Блоков:1</div><canvas id="tbC" width="300" height="450"></canvas><button id="tbR">Заново</button>`; const canvas=c.querySelector('#tbC'),ctx=canvas.getContext('2d'),scEl=c.querySelector('#tbS'); let blocks=[{x:50,y:420,w:200,h:20}],curBlock={x:50,y:400,w:200,h:20,moving:true,dir:1,speed:3},over=false,interval; function step(){if(over)return;if(curBlock.moving){curBlock.x+=curBlock.speed*curBlock.dir;if(curBlock.x+curBlock.w>300||curBlock.x<0)curBlock.dir*=-1;} draw();} function drop(){if(!curBlock.moving||over)return;curBlock.moving=false;const last=blocks[0];const ol=Math.max(curBlock.x,last.x),or=Math.min(curBlock.x+curBlock.w,last.x+last.w),ow=or-ol; if(ow<=0){over=true;scEl.textContent=`Промах! Блоков:${blocks.length}`;draw();return;} curBlock.x=ol;curBlock.w=ow;curBlock.y=last.y-20;blocks.unshift(curBlock); curBlock={x:50,y:blocks[0].y-20,w:blocks[0].w,h:20,moving:true,dir:Math.random()>0.5?1:-1,speed:2+blocks.length*0.3}; scEl.textContent=`Блоков:${blocks.length}`;draw();} function draw(){ctx.fillStyle='#1a1a3e';ctx.fillRect(0,0,300,450);blocks.forEach((b,i)=>{ctx.fillStyle=`hsl(${i*25},70%,55%)`;ctx.fillRect(b.x,b.y,b.w,b.h);}); if(curBlock.moving){ctx.fillStyle='#facc15';ctx.fillRect(curBlock.x,curBlock.y,curBlock.w,curBlock.h);} if(over){ctx.fillStyle='#fff';ctx.font='20px sans-serif';ctx.fillText('GAME OVER',60,200);}} canvas.onclick=drop; c.querySelector('#tbR').onclick=()=>{blocks=[{x:50,y:420,w:200,h:20}];curBlock={x:50,y:400,w:200,h:20,moving:true,dir:1,speed:3};over=false;scEl.textContent='Блоков:1';}; interval=setInterval(step,16); draw(); return ()=>clearInterval(interval); }

  function initCatch(c){ c.innerHTML=`<div class="score" id="cfS">0</div><canvas id="cfC" width="400" height="450"></canvas><button id="cfR">Заново</button>`; const canvas=c.querySelector('#cfC'),ctx=canvas.getContext('2d'),scEl=c.querySelector('#cfS'); let basket={x:160,w:80,h:20,y:410},items=[],score=0,over=false,interval,frame=0; function step(){if(over)return;frame++;if(frame%25===0)items.push({x:Math.random()*380,y:-20,r:12,sp:2+Math.random()*2}); items.forEach(i=>i.y+=i.sp); items.forEach(i=>{if(i.y+i.r>=410&&i.y-i.r<=430&&i.x>basket.x&&i.x<basket.x+80){i.caught=true;score+=5;}}); items=items.filter(i=>!i.caught&&i.y<470); if(items.some(i=>i.y>450&&!i.caught))over=true; scEl.textContent=over?`Конец: ${score}`:score; draw();} function draw(){ctx.fillStyle='#1a1a3e';ctx.fillRect(0,0,400,450);ctx.fillStyle='#facc15';ctx.fillRect(basket.x,basket.y,80,20);ctx.fillStyle='#ef4444'; items.forEach(i=>{ctx.beginPath();ctx.arc(i.x,i.y,12,0,2*Math.PI);ctx.fill();});} canvas.onmousemove=e=>{const rect=canvas.getBoundingClientRect();basket.x=(e.clientX-rect.left)*(400/rect.width)-40;basket.x=Math.max(0,Math.min(320,basket.x));}; c.querySelector('#cfR').onclick=()=>{items=[];score=0;over=false;frame=0;scEl.textContent='0';}; interval=setInterval(step,16); draw(); return ()=>clearInterval(interval); }

  // ---------- 29. МОРСКОЙ БОЙ (исправленная расстановка) ----------
  function initBattle(c){ c.innerHTML=`

  let mode=null, player1Board=[], player2Board=[], p1Hits=[], p2Hits=[], currentPlayer=1, gameOver=false, phase='mode';

  function canPlace(board,r,c,len,dir){

    return true;
  }
  function placeShip(board,r,c,len,dir){if(dir==='h')for(let i=0;i<len;i++)board[r][c+i]=1; else for(let i=0;i<len;i++)board[r+i][c]=1;}

    if(mode==='bot'){player2Board=emptyBoard(); ships.forEach(len=>{let placed=false;while(!placed){const r=Math.floor(Math.random()*10),c=Math.floor(Math.random()*10),d=Math.random()<0.5?'h':'v'; if(canPlace(player2Board,r,c,len,d)){placeShip(player2Board,r,c,len,d);placed=true;}}});}
    p1Hits=emptyHits();p2Hits=emptyHits();currentPlayer=1;gameOver=false;phase='game';
    placeDiv.style.display='none';gameDiv.style.display='block';
    renderGame();c.querySelector('#bsStatus').textContent='Ход: Игрок 1';
    if(mode==='bot'&&currentPlayer===2)botMove();
  }
  function renderGame(){
    renderGrid(c.querySelector('#bsMy'),player1Board,p2Hits,true);
    renderGrid(c.querySelector('#bsOpp'),player2Board,p1Hits,false,currentPlayer===1&&!gameOver,(r,c)=>playerMove(r,c));
    c.querySelector('#bsOppTitle').textContent=mode==='bot'?'Поле бота':'Поле Игрока 2';
    if(gameOver){c.querySelector('#bsStatus').textContent=winner===1?'Победил Игрок 1!': (mode==='bot'?'Победил бот':'Победил Игрок 2');}
  }
  function renderGrid(el,shipBoard,hitBoard,showShips,clickable,onClick){
    el.innerHTML='';for(let r=0;r<10;r++)for(let c=0;c<10;c++){
      const cell=document.createElement('div');cell.className='battleship-cell';
      if(showShips&&shipBoard[r][c]===1)cell.classList.add('ship');
      if(hitBoard[r][c]===true){cell.classList.add('hit');cell.textContent='✖';}
      else if(hitBoard[r][c]===false){cell.classList.add('miss');cell.textContent='·';}
      if(clickable&&hitBoard[r][c]===null){cell.classList.add('clickable');cell.onclick=()=>onClick(r,c);}
      el.appendChild(cell);
    }
  }
  function playerMove(r,c){
    if(gameOver||currentPlayer!==1||p1Hits[r][c]!==null)return;
    const hit=player2Board[r][c]===1;p1Hits[r][c]=hit;
    renderGame();
    if(checkWin(player2Board,p1Hits)){gameOver=true;winner=1;renderGame();return;}
    if(!hit){currentPlayer=2;c.querySelector('#bsStatus').textContent=mode==='bot'?'Ход бота':'Ход: Игрок 2';
      if(mode==='two'){showOverlay('Передайте устройство Игроку 2',()=>{renderGame();});}
      else{renderGame();botMove();}
    }
  }
  function botMove(){
    if(gameOver||mode!=='bot'||currentPlayer!==2)return;
    const avail=[];for(let r=0;r<10;r++)for(let c=0;c<10;c++)if(p2Hits[r][c]===null)avail.push({r,c});
    if(avail.length===0)return;
    const {r,c}=avail[Math.floor(Math.random()*avail.length)];
    const hit=player1Board[r][c]===1;p2Hits[r][c]=hit;
    renderGame();c.querySelector('#bsStatus').textContent='Ход бота...';
    if(checkWin(player1Board,p2Hits)){gameOver=true;winner=2;renderGame();return;}
    if(hit){setTimeout(botMove,500);}else{currentPlayer=1;c.querySelector('#bsStatus').textContent='Ваш ход';renderGame();}
  }
  function checkWin(shipBoard,hitBoard){return shipBoard.every((row,r)=>row.every((cell,c)=>cell===0||hitBoard[r][c]===true));}
  c.querySelector('#bsBot').onclick=()=>{mode='bot';startPlacement(1);};
  c.querySelector('#bsTwo').onclick=()=>{mode='two';startPlacement(1);};
  c.querySelector('#bsRestart').onclick=()=>{phase='mode';modeDiv.style.display='block';placeDiv.style.display='none';gameDiv.style.display='none';overlay.style.display='none';};
  return ()=>{};
  }

  // ---------- 30. 2048 ----------
  function init2048(c){ c.innerHTML=`<div class="score" id="g2048sc">0</div><div style="display:grid;grid-template-columns:repeat(4,70px);gap:6px;justify-content:center;margin:15px auto;" id="g2048g"></div><button id="g2048r">Новая игра</button>`; let board,score,over; const grid=c.querySelector('#g2048g'),scEl=c.querySelector('#g2048sc'); function init(){board=Array(4).fill().map(()=>Array(4).fill(0));score=0;over=false;addRandom();addRandom();render();} function addRandom(){const empty=[];for(let r=0;r<4;r++)for(let c=0;c<4;c++)if(board[r][c]===0)empty.push({r,c}); if(empty.length){const {r,c}=empty[Math.floor(Math.random()*empty.length)];board[r][c]=Math.random()<0.9?2:4;}} function move(dir){if(over)return false;let moved=false;const old=board.map(row=>[...row]); if(dir==='left'||dir==='right'){for(let r=0;r<4;r++){let row=board[r].filter(v=>v); if(dir==='right')row.reverse(); for(let i=0;i<row.length-1;i++){if(row[i]&&row[i]===row[i+1]){row[i]*=2;score+=row[i];row[i+1]=0;}} row=row.filter(v=>v); while(row.length<4)dir==='left'?row.push(0):row.unshift(0); if(dir==='right')row.reverse(); board[r]=row;}} else{for(let c=0;c<4;c++){let col=board.map(r=>r[c]).filter(v=>v); if(dir==='down')col.reverse(); for(let i=0;i<col.length-1;i++){if(col[i]&&col[i]===col[i+1]){col[i]*=2;score+=col[i];col[i+1]=0;}} col=col.filter(v=>v); while(col.length<4)dir==='up'?col.push(0):col.unshift(0); if(dir==='down')col.reverse(); for(let r=0;r<4;r++)board[r][c]=col[r];}} moved=!old.every((row,r)=>row.every((v,c)=>v===board[r][c])); if(moved){addRandom();render();if(isGameOver()){over=true;render();}} return moved;} function isGameOver(){for(let r=0;r<4;r++)for(let c=0;c<4;c++){if(board[r][c]===0)return false; if(c<3&&board[r][c]===board[r][c+1])return false; if(r<3&&board[r][c]===board[r+1][c])return false;} return true;} function render(){grid.innerHTML='';board.forEach(row=>row.forEach(v=>{const d=document.createElement('div');d.style.width='70px';d.style.height='70px';d.style.background=v?`hsl(${Math.log2(v)*25},70%,50%)`:'#333';d.style.borderRadius='8px';d.style.display='flex';d.style.alignItems='center';d.style.justifyContent='center';d.style.fontWeight='bold';d.style.fontSize='1.2rem';d.textContent=v||'';grid.appendChild(d);})); scEl.textContent=score; if(over){scEl.textContent=`Игра окончена! Счёт: ${score}`;}} document.addEventListener('keydown',function gk(e){e.preventDefault(); if(e.key==='ArrowLeft')move('left'); else if(e.key==='ArrowRight')move('right'); else if(e.key==='ArrowUp')move('up'); else if(e.key==='ArrowDown')move('down');}); c.querySelector('#g2048r').onclick=init; init(); return ()=>{}; }
</script>
